<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NASA Smart Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>
body {
  margin:0;
  background:#000;
  color:white;
  font-family:Arial;
  text-align:center;
}

#title {
  color:red;
  margin:12px;
  font-size:20px;
}

#scanner {
  width:360px;
  height:270px;
  margin:auto;
  border:3px solid red;
  box-shadow:0 0 25px red;
  position:relative;
  overflow:hidden;
  background:black;
}

video {
  width:100%;
  height:100%;
  object-fit:cover;
}

#scanline {
  position:absolute;
  width:100%;
  height:4px;
  background:red;
  animation:scan 2s linear infinite;
}

@keyframes scan {
  0% { top:0; }
  50% { top:calc(100% - 4px); }
  100% { top:0; }
}

#name {
  font-size:22px;
  margin-top:10px;
}

#cost {
  color:#ccc;
  margin-top:6px;
}

#conf {
  font-size:12px;
  color:#666;
  margin-bottom:10px;
}

/* MANUAL INPUT */
#manualBox {
  margin-top:20px;
}

input {
  padding:10px;
  width:240px;
  background:black;
  border:2px solid red;
  color:white;
  text-align:center;
}

button {
  padding:10px;
  margin-left:5px;
  background:black;
  border:2px solid red;
  color:white;
  cursor:pointer;
}

button:hover {
  background:red;
}
</style>
</head>

<body>

<div id="title">Please scan item for details</div>

<div id="scanner">
  <video id="video" autoplay playsinline></video>
  <div id="scanline"></div>
</div>

<div id="name"></div>
<div id="cost"></div>
<div id="conf"></div>

<!-- 🧠 MANUAL MODE -->
<div id="manualBox">
  <input id="manualInput" placeholder="Enter item name (e.g. cup, straw, egg)">
  <button onclick="manualSearch()">Search</button>
</div>

<script>
const video = document.getElementById("video");

// CAMERA
navigator.mediaDevices.getUserMedia({ video: true, audio: false })
.then(stream => video.srcObject = stream)
.catch(() => {
  document.getElementById("title").innerText =
    "Camera blocked — allow permission";
});

// 🔴 FULL ITEM DATABASE
const items = {
  cup: {name:"Cup", cost:"$10,000.00"},
  scissors: {name:"Scissors", cost:"$250.00 PER DAY RENTAL"},
  baseboard: {name:"Baseboard", cost:"$15,000.00"},

  "small index card": {name:"Small Index Card", cost:"SALE $2,000.00"},
  "large index card": {name:"Large Index Card", cost:"SALE $3,000.00"},

  "small straw": {name:"Small Straw", cost:"SALE $1,500.00"},
  "large straw": {name:"Large Straw", cost:"SALE $2,000.00"},

  "small marshmallow": {name:"Small Marshmallow", cost:"SALE $3,000.00"},
  "medium marshmallow": {name:"Medium Marshmallow", cost:"SALE $4,200.00"},
  "large marshmallow": {name:"Large Marshmallow", cost:"$5,500.00"}
};

// DISPLAY FUNCTION
function show(itemKey) {
  const item = items[itemKey];

  if (!item) {
    document.getElementById("name").innerText = "Unknown item";
    document.getElementById("cost").innerText = "No data found";
    document.getElementById("conf").innerText = "";
    return;
  }

  document.getElementById("name").innerText = item.name;
  document.getElementById("cost").innerText = "Cost: " + item.cost;
  document.getElementById("conf").innerText = "Manual / AI match";
}

// 🧠 MANUAL SEARCH
function manualSearch() {
  const val = document.getElementById("manualInput").value
    .toLowerCase()
    .trim();

  show(val);
}

// 🧠 AI PART
async function startAI() {
  const model = await cocoSsd.load();

  let last = "";

  setInterval(async () => {
    const preds = await model.detect(video);
    if (!preds.length) return;

    const p = preds[0];

    let detected = p.class;

    // prevent spam updates
    if (detected === last) return;
    last = detected;

    // SMART MAPPING
    if (detected === "cup") show("cup");
    else if (detected === "scissors") show("scissors");
    else if (detected === "paper") show("baseboard");

    else if (detected === "bottle") {
      show("large straw");
    }

    else if (detected === "cell phone") {
      show("medium marshmallow");
    }

    else {
      document.getElementById("name").innerText = "Scanning...";
      document.getElementById("cost").innerText = "";
      document.getElementById("conf").innerText =
        "AI sees: " + detected;
    }

  }, 1200);
}

startAI();
</script>

</body>
</html>
