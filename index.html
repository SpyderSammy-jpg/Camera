<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NASA Scanner</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

<style>
body {
  margin:0;
  background:#000;
  font-family:Arial;
  color:white;
  text-align:center;
}

#title {
  color:red;
  margin:12px;
  font-size:20px;
}

/* CAMERA FRAME */
#scanner {
  width:360px;
  height:270px;
  margin:auto;
  border:3px solid red;
  box-shadow:0 0 25px red;
  position:relative;
  overflow:hidden;
  background:black;
}

/* REAL CAMERA VIDEO */
video {
  width:100%;
  height:100%;
  object-fit:cover;
}

/* SCAN LINE EFFECT */
#scanline {
  position:absolute;
  width:100%;
  height:4px;
  background:red;
  animation:scan 2s linear infinite;
  top:0;
}

@keyframes scan {
  0% { top:0; }
  50% { top:calc(100% - 4px); }
  100% { top:0; }
}

#name {
  font-size:22px;
  margin-top:10px;
}

#cost {
  color:#ccc;
  margin-top:5px;
}

#conf {
  font-size:12px;
  color:#666;
}
</style>
</head>

<body>

<div id="title">Please scan item for details</div>

<div id="scanner">
  <video id="video" autoplay playsinline></video>
  <div id="scanline"></div>
</div>

<div id="name"></div>
<div id="cost"></div>
<div id="conf"></div>

<script>
const video = document.getElementById("video");

// 🔴 CAMERA START (THIS IS THE IMPORTANT FIX)
navigator.mediaDevices.getUserMedia({ video: true, audio: false })
.then(stream => {
  video.srcObject = stream;
})
.catch(err => {
  document.getElementById("title").innerText =
    "Camera blocked — allow permission to continue";
});

const prices = {
  cup: {n:"Cup", c:"$10,000.00"},
  scissors: {n:"Scissors", c:"$250.00 PER DAY RENTAL"},
  book: {n:"Baseboard (approx)", c:"$15,000.00"},
  bottle: {n:"Straw-like object", c:"$2,000.00"},
  cell: {n:"Marshmallow-type object", c:"$4,200.00"}
};

function guessSize(box) {
  let area = box[2] * box[3];
  if (area < 60000) return "small";
  if (area < 140000) return "medium";
  return "large";
}

async function start() {
  const model = await cocoSsd.load();

  setInterval(async () => {
    const preds = await model.detect(video);

    if (!preds.length) return;

    const p = preds[0];
    const size = guessSize(p.bbox);

    let name = "Unknown item";
    let cost = "No data";

    // 🔴 MAPPING LOGIC
    if (p.class === "cup") {
      name = "Cup";
      cost = "$10,000.00";
    }

    else if (p.class === "book") {
      if (size === "small") {
        name = "Small Index Card";
        cost = "SALE $2,000.00";
      } else if (size === "medium") {
        name = "Large Index Card";
        cost = "SALE $3,000.00";
      } else {
        name = "Baseboard";
        cost = "$15,000.00";
      }
    }

    else if (p.class === "bottle") {
      if (size === "small") {
        name = "Small Straw";
        cost = "SALE $1,500.00";
      } else {
        name = "Large Straw";
        cost = "SALE $2,000.00";
      }
    }

    else if (p.class === "cell phone") {
      if (size === "small") {
        name = "Small Marshmallow";
        cost = "SALE $3,000.00";
      } else if (size === "medium") {
        name = "Medium Marshmallow";
        cost = "SALE $4,200.00";
      } else {
        name = "Large Marshmallow";
        cost = "$5,500.00";
      }
    }

    else if (p.class === "scissors") {
      name = "Scissors";
      cost = "$250.00 PER DAY RENTAL";
    }

    document.getElementById("name").innerText = name;
    document.getElementById("cost").innerText = "Cost: " + cost;
    document.getElementById("conf").innerText =
      "Confidence: " + Math.round(p.score * 100) + "%";

  }, 1000);
}

start();
</script>

</body>
</html>
